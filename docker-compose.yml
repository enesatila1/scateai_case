version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - PORT=8000
    volumes:
      - ./src:/app/src
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
